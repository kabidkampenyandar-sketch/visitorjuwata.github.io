<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>PAS VISITOR UPBU JUWATA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Container dengan background shapes */
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 50px 40px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative shapes - background */
    .shape-top-left {
      position: absolute;
      width: 150px;
      height: 150px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      top: -50px;
      left: -50px;
      opacity: 0.1;
    }

    .shape-bottom-right {
      position: absolute;
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      bottom: -80px;
      right: -80px;
      opacity: 0.1;
    }

    .shape-accent {
      position: absolute;
      width: 4px;
      height: 50px;
      background: linear-gradient(180deg, #667eea 0%, transparent 100%);
      top: 30px;
      left: 30px;
      border-radius: 4px;
    }

    .shape-accent-right {
      position: absolute;
      width: 4px;
      height: 50px;
      background: linear-gradient(180deg, #764ba2 0%, transparent 100%);
      top: 30px;
      right: 30px;
      border-radius: 4px;
    }

    /* Header section */
    .header {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 13px;
      color: #999;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      margin: 15px auto;
      border-radius: 3px;
    }

    /* Form section */
    .form {
      position: relative;
      z-index: 2;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 13px;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      background-color: #f8f9ff;
    }

    input::placeholder {
      color: #ccc;
    }

    /* Button group */
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 35px;
      justify-content: center;
    }

    button {
      flex: 1;
      padding: 13px 20px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      text-align: center;
    }

    .btn-generate {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
    }

    .btn-generate:active {
      transform: translateY(0);
    }

    .btn-print {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }

    .btn-print:hover {
      background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
    }

    /* A4 Print section */
    @page {
      size: A4;
      margin: 0;
      padding: 0;
    }

    #pages {
      display: flex;
      flex-wrap: wrap;
    }

    .a4 {
      width: 21cm;
      height: 29.7cm;
      display: grid;
      grid-template-columns: repeat(2, 8.5cm);
      grid-template-rows: repeat(2, 12cm);
      gap: 0.8cm;
      padding: 1cm;
      justify-content: center;
      align-content: center;
      page-break-after: always;
      box-sizing: border-box;
    }

    .card {
      width: 8.5cm;
      height: 12cm;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: fill;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .text {
      position: absolute;
      z-index: 2;
      font-weight: bold;
      text-align: center;
      width: 90%;
      left: 5%;
      word-wrap: break-word;
    }

    .number {
      top: 58%;
      color: white;
      font-size: 18px;
    }

    .company {
      top: 72%;
      color: black;
      font-size: 18px;
    }

    .date {
      top: 85%;
      color: black;
      font-size: 18px;
    }

    @media print {
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: white;
      }

      body * {
        visibility: hidden;
      }

      #pages, #pages * {
        visibility: visible;
      }

      #pages {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      .a4 {
        position: relative;
        width: 21cm;
        height: 29.7cm;
        margin: 0;
        padding: 1cm;
      }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 40px 25px;
      }

      .header h1 {
        font-size: 24px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- Decorative shapes -->
    <div class="shape-top-left"></div>
    <div class="shape-bottom-right"></div>
    <div class="shape-accent"></div>
    <div class="shape-accent-right"></div>

    <!-- Header -->
    <div class="header">
      <h1>PAS VISITOR UPBU JUWATA</h1>
      <div class="divider"></div>
    </div>

    <!-- Form -->
    <div class="form">
      <div class="form-group">
        <label for="company">Nama Perusahaan</label>
        <input type="text" id="company" placeholder="Masukkan nama perusahaan">
      </div>

      <div class="form-group">
        <label for="end">Tanggal Berakhir</label>
        <input type="date" id="end">
      </div>

      <div class="form-group">
        <label for="jumlah">Jumlah Visitor</label>
        <input type="number" id="jumlah" placeholder="Jumlah Visitor (max 32)" min="1" max="32">
      </div>

      <div class="form-group">
        <label for="startNumber">Nomor Visitor Awal</label>
        <input type="number" id="startNumber" placeholder="Nomor Awal" value="1">
      </div>

      <div class="button-group">
        <button class="btn-generate" onclick="generate()">Generate</button>
        <button class="btn-print" onclick="window.print()">Print</button>
      </div>
    </div>
  </div>

  <div id="pages"></div>

  <script>
    function formatDate(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear();
      return `s.d ${day}-${month}-${year}`;
    }

    function generate() {
      const company = document.getElementById('company').value;
      const end = document.getElementById('end').value;
      const jumlah = parseInt(document.getElementById('jumlah').value);
      let nomor = parseInt(document.getElementById('startNumber').value);

      const pages = document.getElementById('pages');
      pages.innerHTML = '';

      let currentPage;

      const endFormatted = formatDate(end);

      for (let i = 0; i < jumlah; i++) {
        if (i % 4 === 0) {
          currentPage = document.createElement('div');
          currentPage.className = 'a4';
          pages.appendChild(currentPage);
        }

        const card = document.createElement('div');
        card.className = 'card';

        const numberText = `UPBU.JWT.${String(nomor).padStart(3, '0')}`;

        card.innerHTML = `
          <img src="design.png" class="bg">
          <div class="text number">${numberText}</div>
          <div class="text company">${company}</div>
          <div class="text date">${endFormatted}</div>
        `;

        currentPage.appendChild(card);
        nomor++;
      }
    }
  </script>

</body>
</html>
